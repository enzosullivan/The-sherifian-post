backend:
  name: github
  repo: ENZOSULLIVAN/THE_SHERIFIAN_POST # À remplacer par ton repo
  branch: main
  base_url: https://your-oauth-proxy.com # URL de ton proxy OAuth (ex: GitHub Gateway)
  auth_endpoint: auth

media_folder: "assets/images" # Où les images seront stockées
public_folder: "/assets/images"

collections:
  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date de publication", name: "date", widget: "datetime" }
      - { 
          label: "Catégorie", 
          name: "category", 
          widget: "select", 
          options: ["Global Reach", "The Shield", "Archives", "Cultural DNA"] 
        }
      - { label: "Image à la une", name: "featured_image", widget: "image" }
      - { label: "Alt de l'image", name: "image_alt", widget: "string" }
      - { 
          label: "SEO Description", 
          name: "seo_description", 
          widget: "string", 
          pattern: [".{1,160}", "La description SEO doit faire moins de 160 caractères"] 
        }
      - { label: "Corps de l'article", name: "body", widget: "markdown" }
      
