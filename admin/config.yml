backend:
  name: github
  repo: enzosullivan/The-sherifian-post
  branch: main
  # REMPLACE l'URL ci-dessous par ton URL Netlify réelle (SANS le / à la fin)
  base_url: https://fascinating-cajeta-89305f.netlify.app/
  auth_endpoint: auth

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Catégorie", name: "category", widget: "select", options: ["Global Reach", "The Shield", "Archives", "Cultural DNA"] }
      - { label: "Image à la une", name: "featured_image", widget: "image" }
      - { label: "SEO Description", name: "seo_description", widget: "string" }
      - { label: "Corps de l'article", name: "body", widget: "markdown" }

  - name: "highlights"
    label: "Preuve du Jour"
    folder: "content/highlights"
    create: true
    fields:
      - { label: "Titre de la preuve", name: "title", widget: "string" }
      - { label: "Image du document", name: "featured_image", widget: "image" }
      - { label: "Analyse", name: "body", widget: "markdown" }

  - name: "radar"
    label: "Radar de Debunking"
    folder: "content/radar"
    create: true
    fields:
      - { label: "Titre de l'alerte", name: "title", widget: "string" }
      - { label: "Contenu court", name: "body", widget: "text" }
      
