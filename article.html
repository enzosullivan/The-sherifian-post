<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sherifian Post</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .article-container { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border: 1px solid #eee; }
        .meta { color: var(--gold); font-weight: bold; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 10px; }
        .featured-img { width: 100%; height: auto; margin-bottom: 20px; border-bottom: 3px solid var(--dark-green); }
        #post-body { font-size: 1.2rem; line-height: 1.8; text-align: justify; }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--dark-green); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>THE SHERIFIAN POST</h1>
    </header>

    <div class="article-container">
        <a href="index.html" class="back-link">← RETOUR AUX DÉPÊCHES</a>
        
        <div id="loader">Chargement de l'analyse...</div>
        
        <article id="article-content" style="display:none;">
            <div class="meta" id="post-meta"></div>
            <h1 id="post-title" style="font-size: 2.5rem; margin-top: 0;"></h1>
            <img id="post-image" class="featured-img" src="" alt="" style="display:none;">
            <div id="post-body"></div>
        </article>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const articleId = params.get('id');
        const username = 'enzosullivan'; 
        const repo = 'The-sherifian-post';

        async function loadArticle() {
            if (!articleId) return;

            try {
                // Déterminer le dossier (articles, radar ou highlights)
                let folder = "articles";
                if (window.location.href.includes("id=preuve")) folder = "highlights";
                
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/content/${folder}/${articleId}`);
                const data = await response.json();
                
                // Décodage UTF-8 robuste
                const markdown = decodeURIComponent(escape(atob(data.content)));
                
                // Extraction du Frontmatter (les métadonnées ---)
                const parts = markdown.split('---');
                const frontmatterRaw = parts[1];
                const content = parts.slice(2).join('---');

                // Parsing simple des métadonnées
                const titleMatch = frontmatterRaw.match(/title:\s*"(.*)"/);
                const imageMatch = frontmatterRaw.match(/featured_image:\s*"(.*)"/);
                const categoryMatch = frontmatterRaw.match(/category:\s*"(.*)"/);

                // Injection
                document.getElementById('post-title').innerText = titleMatch ? titleMatch[1] : articleId.replace('.md','');
                document.getElementById('post-body').innerHTML = marked.parse(content);
                
                if (categoryMatch) document.getElementById('post-meta').innerText = categoryMatch[1];
                
                if (imageMatch && imageMatch[1]) {
                    const img = document.getElementById('post-image');
                    img.src = imageMatch[1].startsWith('http') ? imageMatch[1] : imageMatch[1];
                    img.style.display = 'block';
                }

                document.title = document.getElementById('post-title').innerText + " | The Sherifian Post";
                document.getElementById('loader').style.display = 'none';
                document.getElementById('article-content').style.display = 'block';

            } catch (e) {
                document.getElementById('loader').innerText = "Erreur lors du chargement de l'article.";
            }
        }

        loadArticle();
    </script>
</body>
</html>
