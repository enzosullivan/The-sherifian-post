<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sherifian Post | Actualités Statiques</title>
    <link rel="stylesheet" href="assets/style.css"> </head>
<body>

    <header>
        <h1>The Sherifian Post</h1>
        <nav>
            <button onclick="filter('Global Reach')">Global Reach</button>
            <button onclick="filter('The Shield')">The Shield</button>
            <button onclick="filter('Archives')">Archives</button>
            <button onclick="filter('Cultural DNA')">Cultural DNA</button>
        </nav>
    </header>

    <main class="main-grid">
    <section>
        <h2 style="border-bottom: 2px solid var(--dark-green)">Dernières Dépêches</h2>
        <div id="articles-list">
            <p>Chargement des actualités...</p>
        </div>
    </section>

    <aside class="sidebar">
        <div class="radar-box">
            <h3>Radar de Debunking</h3>
            <p><small><strong>[RUMEUR]</strong> Les prétendues frontières coloniales...</small></p>
            <p><small><strong>[PSYOPS]</strong> Déconstruction de l'article fallacieux...</small></p>
        </div>

        <div class="edito-box">
            <h3>Édito de Vision</h3>
            <p><em>"The Sherifian Post est un rempart. Nous documentons la réalité d'un Empire souverain..."</em></p>
        </div>
    </aside>
 </main>

    <script>
        // Remplace par ton pseudo GitHub et le nom de ton repo
        const username = 'enzosullivan'; 
const repo = 'The-sherifian-post';

// Fonction générique pour récupérer des fichiers
async function fetchFolder(path) {
    const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`);
    return await response.json();
}

async function initSite() {
    // 1. Charger les Articles
    const articles = await fetchFolder('content/articles');
    const articlesContainer = document.getElementById('articles-list');
    articlesContainer.innerHTML = '';
    articles.forEach(file => {
        if(file.name.endsWith('.md')) {
            const div = document.createElement('div');
            div.className = 'article-card';
            const title = file.name.replace('.md', '').replaceAll('-', ' ');
            div.innerHTML = `<h3>${title}</h3><a href="article.html?id=${file.name}">Lire la suite</a>`;
            articlesContainer.appendChild(div);
        }
    });

    // 2. Charger le Radar de Debunking
    const radarFiles = await fetchFolder('content/radar');
    const radarContainer = document.querySelector('.radar-box');
    radarContainer.innerHTML = '<h3>Radar de Debunking</h3>'; // Garde le titre
    radarFiles.slice(0, 3).forEach(async file => { // On prend les 3 derniers
        const res = await fetch(file.download_url);
        const content = await res.text();
        const p = document.createElement('p');
        p.innerHTML = `<small><strong>[ALERTE]</strong> ${content.substring(0, 100)}...</small>`;
        radarContainer.appendChild(p);
    });

    // 3. Charger la Preuve du jour (le plus récent)
    const proofFiles = await fetchFolder('content/highlights');
    if(proofFiles.length > 0) {
        const lastProof = proofFiles[proofFiles.length - 1];
        // Ici tu peux ajouter une logique pour afficher l'image et le titre
        document.querySelector('.preuve-zone').innerHTML = `<h3>Preuve du jour : ${lastProof.name.replace('.md', '')}</h3>`;
    }
}

initSite();
    </script>
</body>
</html>
