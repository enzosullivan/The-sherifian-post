<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sherifian Post | Official Records</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .article-card { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; }
        .article-card img { width: 100%; max-height: 300px; object-fit: cover; margin-bottom: 15px; border: 1px solid #ddd; }
        .article-card h3 { margin: 0 0 10px 0; font-size: 1.8rem; color: var(--text-black); }
        .article-card p { margin-bottom: 15px; color: #555; }
        
        .preuve-zone { background: white; border: 1px solid #ddd; padding: 20px; margin-bottom: 30px; }
        .preuve-content { display: flex; gap: 20px; align-items: start; }
        .preuve-content img { width: 150px; height: 150px; object-fit: cover; border: 1px solid #ccc; }
        .preuve-text { flex: 1; }
        
        .radar-item { font-size: 0.9rem; margin-bottom: 15px; border-left: 3px solid #d32f2f; padding-left: 10px; }
        
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .preuve-content { flex-direction: column; }
            .preuve-content img { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <header>
        <h1>THE SHERIFIAN POST</h1>
        <p>OFFICIAL RECORDS OF THE IMPERIAL CONTINUITY — ESTABLISHED 2026</p>
    </header>

    <nav>
        <button onclick="location.href='index.html'">Accueil</button>
        <button>Global Reach</button>
        <button>The Shield</button>
        <button>Archives</button>
        <button>Cultural DNA</button>
    </nav>

    <main class="main-grid">
        <section>
            <div id="preuve-du-jour" class="preuve-zone" style="display:none;">
                <span style="background:#00332c; color:#c5a059; padding:3px 10px; font-size:0.7rem; font-weight:bold;">PREUVE DU JOUR</span>
                <div id="preuve-container" class="preuve-content"></div>
            </div>

            <h2 style="border-bottom: 2px solid #00332c; margin-bottom: 20px;">Dernières Dépêches Impériales</h2>
            <div id="articles-list">
                <p>Chargement des archives en cours...</p>
            </div>
        </section>

        <aside class="sidebar">
            <div class="radar-box">
                <h3>Radar de Debunking</h3>
                <div id="radar-container"></div>
            </div>
            <div class="edito-box">
                <h3>Édito de Vision</h3>
                <p><em>"The Sherifian Post est un rempart. Nous documentons la réalité d'un Empire souverain."</em></p>
            </div>
        </aside>
    </main>

    <script>
        const username = 'enzosullivan';
        const repo = 'The-sherifian-post';

        // Fonction pour extraire proprement les infos du Markdown
        function parseFrontmatter(text) {
            const obj = {};
            const match = text.match(/---\s*([\s\S]*?)\s*---/);
            if (match) {
                const lines = match[1].split('\n');
                lines.forEach(line => {
                    const [key, ...val] = line.split(':');
                    if (key && val) obj[key.trim()] = val.join(':').trim().replace(/^"(.*)"$/, '$1');
                });
            }
            return obj;
        }

        async function initSite() {
            try {
                // 1. ARTICLES
                const resArticles = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/content/articles`);
                const articles = await resArticles.json();
                const container = document.getElementById('articles-list');
                container.innerHTML = '';

                for (const file of articles.reverse()) {
                    if(!file.name.endsWith('.md')) continue;
                    const raw = await (await fetch(file.download_url)).text();
                    const data = parseFrontmatter(raw);
                    const div = document.createElement('div');
                    div.className = 'article-card';
                    div.innerHTML = `
                        ${data.featured_image ? `<img src="${data.featured_image}" alt="Cover">` : ''}
                        <h3>${data.title || file.name}</h3>
                        <p>${data.seo_description || 'Analyse en cours...'}</p>
                        <a href="article.html?id=${file.name}">LIRE LA SUITE</a>
                    `;
                    container.appendChild(div);
                }

                // 2. RADAR
                const resRadar = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/content/radar`);
                const radarFiles = await resRadar.json();
                const radarContainer = document.getElementById('radar-container');
                for (const file of radarFiles.slice(-3).reverse()) {
                    const text = await (await fetch(file.download_url)).text();
                    const cleanText = text.split('---').pop().trim();
                    const div = document.createElement('div');
                    div.className = 'radar-item';
                    div.innerHTML = `<strong>[ALERTE]</strong> ${cleanText.substring(0, 100)}...`;
                    radarContainer.appendChild(div);
                }

                // 3. PREUVE DU JOUR
                const resProof = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/content/highlights`);
                const proofFiles = await resProof.json();
                if (proofFiles.length > 0) {
                    const file = proofFiles[proofFiles.length - 1];
                    const raw = await (await fetch(file.download_url)).text();
                    const data = parseFrontmatter(raw);
                    document.getElementById('preuve-du-jour').style.display = 'block';
                    document.getElementById('preuve-container').innerHTML = `
                        ${data.featured_image ? `<img src="${data.featured_image}">` : ''}
                        <div class="preuve-text">
                            <h3>${data.title || 'Document Impérial'}</h3>
                            <button onclick="location.href='article.html?id=${file.name}'" style="background:black; color:white; border:none; padding:8px 12px; cursor:pointer; font-size:0.7rem; margin-top:10px;">ANALYSER LE MANUSCRIT</button>
                        </div>
                    `;
                }
            } catch (e) { console.error(e); }
        }
        initSite();
    </script>
</body>
</html>
